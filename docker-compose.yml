services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reliqueue
      POSTGRES_PASSWORD: reliqueue
      POSTGRES_DB: reliqueue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reliqueue -d reliqueue"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://reliqueue:reliqueue@db:5432/reliqueue
      DEBUG: "true"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
