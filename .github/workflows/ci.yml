name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: reliqueue
          POSTGRES_PASSWORD: reliqueue
          POSTGRES_DB: reliqueue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reliqueue -d reliqueue"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://reliqueue:reliqueue@localhost:5432/reliqueue_test
      DATABASE_URL: postgresql+asyncpg://reliqueue:reliqueue@localhost:5432/reliqueue_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Create test database
        working-directory: backend
        run: |
          python - <<'PY'
          import psycopg

          with psycopg.connect(
              "postgresql://reliqueue:reliqueue@localhost:5432/postgres",
              autocommit=True,
          ) as conn:
              exists = conn.execute(
                  "SELECT 1 FROM pg_database WHERE datname = %s",
                  ("reliqueue_test",),
              ).fetchone()
              if exists is None:
                  conn.execute('CREATE DATABASE "reliqueue_test"')
          PY

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: pytest -m "not slow" -v --tb=short
